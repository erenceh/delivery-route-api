server:
  build: .
  ports:
    - "8080:8080"
  depends_on:
    - db
    - redis
  env_file:
    - .env

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
      POSTGRES_DB: delivery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: 
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
